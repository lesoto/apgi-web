    <!-- Profile Form Interactivity Script -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Store original values for reset functionality
        const originalValues = {};
        const formInputs = document.querySelectorAll(".form-input");

        // Store original values
        formInputs.forEach((input) => {
          originalValues[input.id] = input.value;

          // Add input event listeners for real-time validation
          input.addEventListener("input", function () {
            validateInput(this);
            markFormAsChanged();
          });

          // Add blur event for validation
          input.addEventListener("blur", function () {
            validateInput(this);
          });
        });

        // Save profile button
        const saveBtn = document.getElementById("save-profile-btn");
        const resetBtn = document.getElementById("reset-profile-btn");
        const statusMessage = document.getElementById("status-message");

        if (saveBtn) {
          saveBtn.addEventListener("click", saveProfile);
        }

        if (resetBtn) {
          resetBtn.addEventListener("click", resetProfile);
        }

        /**
         * Validate individual input
         */
        function validateInput(input) {
          const value = input.value.trim();
          let isValid = true;
          let errorMessage = "";

          // URL validation for link fields
          if (
            input.id &&
            [
              "photo",
              "YouTube",
              "TikTok",
              "facebook",
              "instagram",
              "telegram",
              "github",
            ].includes(input.id)
          ) {
            if (value && !isValidUrl(value)) {
              isValid = false;
              errorMessage = "Please enter a valid URL";
            }
          }

          // Name validation
          if (input.id === "name") {
            if (value.length < 2) {
              isValid = false;
              errorMessage = "Name must be at least 2 characters";
            }
          }

          // About validation
          if (input.id === "about") {
            if (value.length > 500) {
              isValid = false;
              errorMessage = "About section must be less than 500 characters";
            }
          }

          // Update input styling based on validation
          updateInputValidation(input, isValid, errorMessage);

          return isValid;
        }

        /**
         * Check if string is valid URL
         */
        function isValidUrl(string) {
          try {
            const url = new URL(string);
            return url.protocol === "http:" || url.protocol === "https:";
          } catch (_) {
            return false;
          }
        }

        /**
         * Update input validation styling
         */
        function updateInputValidation(input, isValid, errorMessage) {
          // Remove existing validation classes
          input.classList.remove(
            "border-green-500",
            "border-red-500",
            "ring-green-200",
            "ring-red-200",
          );

          if (input.value.trim()) {
            if (isValid) {
              input.classList.add("border-green-500", "ring-green-200");
              removeInputError(input);
            } else {
              input.classList.add("border-red-500", "ring-red-200");
              showInputError(input, errorMessage);
            }
          } else {
            removeInputError(input);
          }
        }

        /**
         * Show input error message
         */
        function showInputError(input, message) {
          removeInputError(input); // Remove existing error first

          const errorDiv = document.createElement("div");
          errorDiv.className = "text-red-500 text-sm mt-1 input-error-message";
          errorDiv.textContent = message;

          input.parentNode.appendChild(errorDiv);
        }

        /**
         * Remove input error message
         */
        function removeInputError(input) {
          const existingError = input.parentNode.querySelector(
            ".input-error-message",
          );
          if (existingError) {
            existingError.remove();
          }
        }

        /**
         * Mark form as changed
         */
        function markFormAsChanged() {
          saveBtn.classList.add("animate-pulse");
          saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Profile *';
        }

        /**
         * Save profile
         */
        async function saveProfile() {
          // Validate all inputs
          let isFormValid = true;
          formInputs.forEach((input) => {
            if (!validateInput(input)) {
              isFormValid = false;
            }
          });

          if (!isFormValid) {
            showStatusMessage("Please fix the errors before saving.", "error");
            return;
          }

          // Show loading state
          saveBtn.disabled = true;
          saveBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';

          try {
            // Simulate API call
            await new Promise((resolve) => setTimeout(resolve, 1500));

            // Save to localStorage
            const profileData = {};
            formInputs.forEach((input) => {
              profileData[input.id] = input.value;
            });
            localStorage.setItem("apgiProfile", JSON.stringify(profileData));

            // Update original values
            Object.assign(originalValues, profileData);

            // Reset button state
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Profile';
            saveBtn.classList.remove("animate-pulse");

            showStatusMessage("Profile saved successfully!", "success");

            // Update profile card if name changed
            const nameInput = document.getElementById("name");
            if (nameInput) {
              const profileName = document.querySelector(".profile-card h3");
              if (profileName) {
                profileName.textContent = nameInput.value || "APGI Framework";
              }
            }
          } catch (error) {
            console.error("Error saving profile:", error);
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Profile';
            showStatusMessage(
              "Error saving profile. Please try again.",
              "error",
            );
          }
        }

        /**
         * Reset profile
         */
        function resetProfile() {
          if (!confirm("Are you sure you want to reset all changes?")) {
            return;
          }

          formInputs.forEach((input) => {
            input.value = originalValues[input.id] || "";
            updateInputValidation(input, true, "");
          });

          saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Profile';
          saveBtn.classList.remove("animate-pulse");

          showStatusMessage("Profile reset to original values.", "info");
        }

        /**
         * Show status message
         */
        function showStatusMessage(message, type) {
          statusMessage.classList.remove(
            "hidden",
            "bg-green-100",
            "bg-red-100",
            "bg-blue-100",
            "text-green-700",
            "text-red-700",
            "text-blue-700",
          );

          const colors = {
            success: "bg-green-100 text-green-700 border-green-200",
            error: "bg-red-100 text-red-700 border-red-200",
            info: "bg-blue-100 text-blue-700 border-blue-200",
          };

          const icons = {
            success: "fas fa-check-circle",
            error: "fas fa-exclamation-circle",
            info: "fas fa-info-circle",
          };

          statusMessage.className = `mt-4 p-4 rounded-lg border ${colors[type]} transition-all duration-300`;
          statusMessage.innerHTML = `<i class="${icons[type]} mr-2"></i>${message}`;

          // Auto-hide after 5 seconds
          setTimeout(() => {
            statusMessage.classList.add("hidden");
          }, 5000);
        }

        // Load saved profile on page load
        loadSavedProfile();

        /**
         * Load saved profile from localStorage
         */
        function loadSavedProfile() {
          const savedProfile = localStorage.getItem("apgiProfile");
          if (savedProfile) {
            try {
              const profileData = JSON.parse(savedProfile);
              formInputs.forEach((input) => {
                if (profileData[input.id]) {
                  input.value = profileData[input.id];
                  originalValues[input.id] = profileData[input.id];
                }
              });

              // Update profile card name
              if (profileData.name) {
                const profileName = document.querySelector(".profile-card h3");
                if (profileName) {
                  profileName.textContent = profileData.name;
                }
              }

              showStatusMessage("Profile loaded from saved data.", "info");
            } catch (error) {
              console.error("Error loading saved profile:", error);
            }
          }
        }
      });
