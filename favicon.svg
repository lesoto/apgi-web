<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="apgiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1658f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1fc7b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#apgiGradient)" stroke="#fff" stroke-width="1"/>
  
  <!-- APGI Brain/Consciousness Symbol -->
  <g fill="#fff">
    <!-- Central core -->
    <circle cx="16" cy="16" r="3" opacity="0.9"/>
    
    <!-- Neural connections -->
    <path d="M16,13 L10,8 M16,13 L22,8 M16,19 L10,24 M16,19 L22,24" 
          stroke="#fff" stroke-width="1.5" fill="none" opacity="0.7"/>
    
    <!-- Outer nodes -->
    <circle cx="10" cy="8" r="1.5" opacity="0.8"/>
    <circle cx="22" cy="8" r="1.5" opacity="0.8"/>
    <circle cx="10" cy="24" r="1.5" opacity="0.8"/>
    <circle cx="22" cy="24" r="1.5" opacity="0.8"/>
    
    <!-- Connecting arcs -->
    <path d="M10,8 Q16,6 22,8 M10,24 Q16,26 22,24" 
          stroke="#fff" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  
  <!-- APGI Text -->
  <text x="16" y="28" font-family="Arial, sans-serif" font-size="4" 
        font-weight="bold" text-anchor="middle" fill="#fff">APGI</text>
</svg>
