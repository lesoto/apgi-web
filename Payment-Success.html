<!doctype html>
<html lang="en">
  <head>
    <script src="assets/js/performance-optimizer.js"></script>
    <script src="assets/js/accessibility-enhancer.js"></script>
    <script src="assets/js/unified-theme-manager.js"></script>
    <script src="assets/js/cdn-fallbacks.js"></script>
    <script src="/config.js"></script>
    <script src="assets/js/environment-config.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Successful - APGI Framework</title>
    <meta
      name="description"
      content="Thank you for your purchase! Your payment was successful and your APGI Framework access is now active."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="favicon.svg" />

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/tailwind-built.css" />
    <link
      rel="stylesheet"
      href="assets/css/tailwind-fallback.css"
      media="all and (prefers-reduced-data: no), (prefers-color-scheme: no), (prefers-contrast: no)"
    />
    <link
      rel="stylesheet"
      href="assets/css/tailwind-fallback.css"
      media="(prefers-reduced-data: reduce) or (prefers-color-scheme: dark) or (prefers-contrast: high)"
    />
    <link rel="stylesheet" href="assets/css/design-system.css" />

    <!-- Performance optimization: Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Resource hints -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//unpkg.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Lucide Icons -->
    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        /* Modern Typography */
        --font-display:
          "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-body:
          "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;

        /* Modern Color Palette */
        --primary: #0f172a;
        --primary-light: #1e293b;
        --accent: #3b82f6;
        --accent-light: #60a5fa;
        --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        /* Semantic Colors */
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #06b6d4;

        /* Neutral Colors */
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --border-light: #f1f5f9;

        /* Effects & Shadows */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);

        /* Transitions */
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-fast: all 0.15s ease;
      }

      body {
        font-family: var(--font-body);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .success-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        box-shadow: var(--shadow-xl);
        max-width: 500px;
        width: 100%;
        padding: 3rem;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .success-icon {
        width: 80px;
        height: 80px;
        background: var(--success);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 2rem;
        color: white;
        font-size: 2.5rem;
      }

      .success-title {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 1rem;
      }

      .success-message {
        color: var(--text-secondary);
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.875rem 2rem;
        border: none;
        border-radius: 0.5rem;
        font-family: var(--font-body);
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: var(--transition);
        margin: 0.5rem;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }

      .btn-secondary {
        background: transparent;
        color: var(--accent);
        border: 2px solid var(--accent);
      }

      .btn-secondary:hover {
        background: var(--accent);
        color: white;
      }

      .order-details {
        background: var(--bg-secondary);
        border-radius: 0.5rem;
        padding: 1.5rem;
        margin: 2rem 0;
        text-align: left;
      }

      .order-details h3 {
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 1rem;
      }

      .order-detail-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
      }

      .order-detail-label {
        color: var(--text-secondary);
      }

      .order-detail-value {
        color: var(--text-primary);
        font-weight: 500;
      }

      @media (max-width: 640px) {
        .success-container {
          padding: 2rem;
        }

        .success-title {
          font-size: 1.5rem;
        }

        .btn {
          display: block;
          width: 100%;
          margin: 0.5rem 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="success-container">
      <div class="success-icon">✓</div>

      <h1 class="success-title">Payment Successful!</h1>

      <p class="success-message">
        Thank you for joining APGI Framework! Your payment has been processed
        successfully and your access is now active.
      </p>

      <div class="order-details">
        <h3>Order Details</h3>
        <div class="order-detail-row">
          <span class="order-detail-label">Status:</span>
          <span class="order-detail-value">Active</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Plan:</span>
          <span class="order-detail-value" id="planName">Professional</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Order ID:</span>
          <span class="order-detail-value" id="orderId">Processing...</span>
        </div>
        <div class="order-detail-row">
          <span class="order-detail-label">Email:</span>
          <span class="order-detail-value" id="customerEmail"
            >Processing...</span
          >
        </div>
      </div>

      <div class="action-buttons">
        <a href="Profile.html" class="btn btn-primary"> Go to Dashboard </a>
        <a href="Home.html" class="btn btn-secondary"> Back to Home </a>
      </div>
    </div>

    <script>
      // Get URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get("session_id");

      // Update order details if session ID is available
      if (sessionId) {
        // In a real implementation, you would verify this with your server
        document.getElementById("orderId").textContent =
          sessionId.substring(0, 8) + "...";

        // Try to get user info from localStorage
        const user = JSON.parse(localStorage.getItem("user") || "{}");
        if (user.email) {
          document.getElementById("customerEmail").textContent = user.email;
        }
      }

      // Initialize Lucide icons if available
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }

      // Auto-redirect to dashboard after 10 seconds
      setTimeout(() => {
        window.location.href = "Profile.html";
      }, 10000);
    </script>
  </body>
</html>
