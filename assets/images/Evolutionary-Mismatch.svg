<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1e293b">
    Evolutionary Mismatch in Consciousness
  </text>
  
  <!-- Ancient Environment -->
  <g id="ancient">
    <rect x="20" y="60" width="160" height="100" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="100" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">
      Ancient Environment
    </text>
    <circle cx="50" cy="110" r="8" fill="#fbbf24"/>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Simple threats
    </text>
    <circle cx="100" cy="110" r="8" fill="#34d399"/>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Clear goals
    </text>
    <circle cx="150" cy="110" r="8" fill="#60a5fa"/>
    <text x="150" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Limited stimuli
    </text>
  </g>
  
  <!-- Modern Environment -->
  <g id="modern">
    <rect x="220" y="60" width="160" height="100" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="300" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">
      Modern Environment
    </text>
    <circle cx="250" cy="110" r="8" fill="#ef4444"/>
    <text x="250" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Complex threats
    </text>
    <circle cx="300" cy="110" r="8" fill="#f59e0b"/>
    <text x="300" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Abstract goals
    </text>
    <circle cx="350" cy="110" r="8" fill="#8b5cf6"/>
    <text x="350" y="130" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#475569">
      Information overload
    </text>
  </g>
  
  <!-- Arrow showing mismatch -->
  <path d="M 190 110 L 210 110" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#64748b">
    Mismatch
  </text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- APGI Framework Solution -->
  <rect x="50" y="190" width="300" height="80" rx="10" fill="url(#grad1)" opacity="0.8"/>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
    APGI Framework Solution
  </text>
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
    Adaptive consciousness architecture
  </text>
  <text x="200" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">
    for modern environmental challenges
  </text>
  
  <!-- Connecting lines -->
  <path d="M 100 160 L 150 190" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M 300 160 L 250 190" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
