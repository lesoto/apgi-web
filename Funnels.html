<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APGI Funnels Launcher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap");

      body {
        font-family: "IBM Plex Sans", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }

      .grotesk {
        font-family: "Space Grotesk", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      }

      .launch-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        transition: all 0.3s ease;
        transform: translateY(0);
      }

      .launch-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .launch-button:active {
        transform: translateY(0);
      }

      .number-badge {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      }
    </style>
  </head>
  <body class="flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 max-w-4xl w-full">
      <header class="text-center mb-10">
        <h1 class="grotesk text-4xl md:text-5xl font-bold text-white mb-4">
          APGI Funnels Launcher
        </h1>
        <p class="text-white/80 text-lg">
          Select a target audience to launch their dedicated funnel page
        </p>
      </header>

      <main class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Button 1 -->
        <button
          onclick="launchPage('1_individual_self_explorers.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              1
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Individual Self-Explorers
              </h3>
              <p class="text-white/80 text-sm">
                Personal growth and self-discovery journey
              </p>
            </div>
          </div>
        </button>

        <!-- Button 2 -->
        <button
          onclick="launchPage('2_therapists_coaches.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              2
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Therapists & Coaches
              </h3>
              <p class="text-white/80 text-sm">
                Professional practitioners and guides
              </p>
            </div>
          </div>
        </button>

        <!-- Button 3 -->
        <button
          onclick="launchPage('3_academic_researchers.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              3
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Academic Researchers
              </h3>
              <p class="text-white/80 text-sm">
                Scientific study and investigation
              </p>
            </div>
          </div>
        </button>

        <!-- Button 4 -->
        <button
          onclick="launchPage('4_organizational_development.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              4
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Organizational Development
              </h3>
              <p class="text-white/80 text-sm">
                Corporate and team growth solutions
              </p>
            </div>
          </div>
        </button>

        <!-- Button 5 -->
        <button
          onclick="launchPage('5_educational_institutions.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              5
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Educational Institutions
              </h3>
              <p class="text-white/80 text-sm">
                Schools and learning organizations
              </p>
            </div>
          </div>
        </button>

        <!-- Button 6 -->
        <button
          onclick="launchPage('6_healthcare_professionals.html')"
          class="launch-button rounded-xl p-6 text-white text-left group"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              6
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Healthcare Professionals
              </h3>
              <p class="text-white/80 text-sm">
                Medical and wellness practitioners
              </p>
            </div>
          </div>
        </button>

        <!-- Button 7 -->
        <button
          onclick="launchPage('7_tech_industry_professionals.html')"
          class="launch-button rounded-xl p-6 text-white text-left group md:col-span-2 lg:col-span-1"
        >
          <div class="flex items-start space-x-4">
            <div
              class="number-badge rounded-full w-10 h-10 flex items-center justify-center text-white font-bold flex-shrink-0"
            >
              7
            </div>
            <div>
              <h3
                class="grotesk font-semibold text-lg mb-2 group-hover:text-yellow-300 transition-colors"
              >
                Tech Industry Professionals
              </h3>
              <p class="text-white/80 text-sm">
                Technology and innovation sector
              </p>
            </div>
          </div>
        </button>
      </main>

      <footer class="mt-10 text-center">
        <p class="text-white/60 text-sm">
          Each funnel is tailored to specific audience needs and goals
        </p>
      </footer>
    </div>

    <script>
      function launchPage(filename) {
        // Open the page in a new tab
        window.open(`funnels/${filename}`, "_blank");
      }

      // Add keyboard navigation
      document.addEventListener("keydown", (e) => {
        if (e.key >= "1" && e.key <= "7") {
          const pages = [
            "1_individual_self_explorers.html",
            "2_therapists_coaches.html",
            "3_academic_researchers.html",
            "4_organizational_development.html",
            "5_educational_institutions.html",
            "6_healthcare_professionals.html",
            "7_tech_industry_professionals.html",
          ];
          launchPage(pages[parseInt(e.key) - 1]);
        }
      });
    </script>
  </body>
</html>
