<!doctype html>
<html lang="en">
  <head>
    <script src="assets/js/performance-optimizer.js"></script>
    <script src="assets/js/accessibility-enhancer.js"></script>
    <script src="assets/js/unified-theme-manager.js"></script>
    <script src="assets/js/cdn-fallbacks.js"></script>
    <script src="/config.js"></script>
    <script src="assets/js/environment-config.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In - APGI Framework</title>
    <meta
      name="description"
      content="Sign in to your APGI Framework account to access your consciousness profile and personalized insights."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" href="favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="favicon.svg" />
    <link rel="stylesheet" href="assets/css/tailwind-built.css" />
    <link
      rel="stylesheet"
      href="assets/css/tailwind-fallback.css"
      media="all and (prefers-reduced-data: no), (prefers-color-scheme: no), (prefers-contrast: no)"
    />
    <link
      rel="stylesheet"
      href="assets/css/tailwind-fallback.css"
      media="(prefers-reduced-data: reduce) or (prefers-color-scheme: dark) or (prefers-contrast: high)"
    />

    <!-- Performance optimization: Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="preload" href="https://unpkg.com/lucide@latest" as="script" />

    <!-- Resource hints -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//unpkg.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="assets/css/design-system.css" />
    <!-- Lucide Icons -->
    <script
      src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"
      crossorigin="anonymous"
    ></script>
    <style>
      :root {
        /* Modern Typography */
        --font-display:
          "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
        --font-body:
          "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;

        /* Modern Color Palette */
        --primary: #0f172a;
        --primary-light: #1e293b;
        --accent: #3b82f6;
        --accent-light: #60a5fa;
        --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        /* Semantic Colors */
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #06b6d4;

        /* Neutral Colors */
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --border-light: #f1f5f9;

        /* Effects & Shadows */
        --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        --shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg:
          0 10px 15px -3px rgba(0, 0, 0, 0.1),
          0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --shadow-xl:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);

        /* Transitions */
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --transition-fast: all 0.15s ease;
      }

      body {
        font-family: var(--font-body);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .auth-container {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        box-shadow: var(--shadow-xl);
        max-width: 400px;
        width: 100%;
        padding: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      .auth-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .auth-title {
        font-family: var(--font-display);
        font-size: 1.875rem;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .auth-subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        font-family: var(--font-body);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: 0.5rem;
      }

      .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        font-family: var(--font-body);
        font-size: 0.875rem;
        transition: var(--transition);
        background: var(--bg-primary);
      }

      .form-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 0.5rem;
        font-family: var(--font-body);
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        transition: var(--transition);
        width: 100%;
      }

      .btn-primary {
        background: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background: #2563eb;
        transform: translateY(-1px);
        box-shadow: var(--shadow-lg);
      }

      .btn-secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }

      .btn-secondary:hover {
        background: var(--accent);
        color: white;
      }

      .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
      }

      .auth-footer p {
        color: var(--text-secondary);
        font-size: 0.875rem;
      }

      .auth-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }

      .error-message {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--danger);
        color: var(--danger);
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }

      .success-message {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid var(--success);
        color: var(--success);
        padding: 0.75rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }

      .tab-container {
        display: flex;
        margin-bottom: 2rem;
        border-bottom: 1px solid var(--border-color);
      }

      .tab-button {
        flex: 1;
        padding: 0.75rem;
        background: transparent;
        border: none;
        border-bottom: 2px solid transparent;
        font-family: var(--font-body);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        transition: var(--transition);
      }

      .tab-button.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      @media (max-width: 640px) {
        .auth-container {
          padding: 1.5rem;
        }

        .auth-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-header">
        <h1 class="auth-title">APGI Framework</h1>
        <p class="auth-subtitle">Access your consciousness profile</p>
      </div>

      <div class="tab-container">
        <button class="tab-button active" data-tab="login">Sign In</button>
        <button class="tab-button" data-tab="register">Create Account</button>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Login Form -->
      <div class="tab-content active" id="loginTab">
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail" class="form-label">Email Address</label>
            <input
              type="email"
              id="loginEmail"
              name="email"
              class="form-input"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              id="loginPassword"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
      </div>

      <!-- Register Form -->
      <div class="tab-content" id="registerTab">
        <form id="registerForm">
          <div class="form-group">
            <label for="registerFirstName" class="form-label">First Name</label>
            <input
              type="text"
              id="registerFirstName"
              name="firstName"
              class="form-input"
              placeholder="Enter your first name"
              autocomplete="given-name"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerLastName" class="form-label">Last Name</label>
            <input
              type="text"
              id="registerLastName"
              name="lastName"
              class="form-input"
              placeholder="Enter your last name"
              autocomplete="family-name"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerEmail" class="form-label">Email Address</label>
            <input
              type="email"
              id="registerEmail"
              name="email"
              class="form-input"
              placeholder="Enter your email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="registerPassword" class="form-label">Password</label>
            <input
              type="password"
              id="registerPassword"
              name="password"
              class="form-input"
              placeholder="Create a password (min 8 characters)"
              minlength="8"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
      </div>

      <div class="auth-footer">
        <p>
          By continuing, you agree to our
          <a href="terms.html">Terms of Service</a> and
          <a href="privacy.html">Privacy Policy</a>
        </p>
      </div>
    </div>

    <script>
      // Tab switching
      const tabButtons = document.querySelectorAll(".tab-button");
      const tabContents = document.querySelectorAll(".tab-content");

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const targetTab = button.dataset.tab;

          // Update button states
          tabButtons.forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");

          // Update content visibility
          tabContents.forEach((content) => {
            content.classList.remove("active");
            if (content.id === `${targetTab}Tab`) {
              content.classList.add("active");
            }
          });

          // Clear messages when switching tabs
          clearMessages();
        });
      });

      // Message handling
      function showError(message) {
        const errorEl = document.getElementById("errorMessage");
        errorEl.textContent = message;
        errorEl.style.display = "block";
        document.getElementById("successMessage").style.display = "none";
      }

      function showSuccess(message) {
        const successEl = document.getElementById("successMessage");
        successEl.textContent = message;
        successEl.style.display = "block";
        document.getElementById("errorMessage").style.display = "none";
      }

      function clearMessages() {
        document.getElementById("errorMessage").style.display = "none";
        document.getElementById("successMessage").style.display = "none";
      }

      // API configuration
      const API_BASE_URL = window.env?.VITE_API_BASE_URL || "/api";

      // Login form handler
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          clearMessages();

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
              localStorage.setItem("token", result.token);
              localStorage.setItem("user", JSON.stringify(result.user));
              showSuccess("Login successful! Redirecting...");

              // Redirect to profile or dashboard after a short delay
              setTimeout(() => {
                window.location.href = "Profile.html";
              }, 1500);
            } else {
              showError(
                result.message ||
                  "Login failed. Please check your credentials.",
              );
            }
          } catch (error) {
            console.error("Login error:", error);
            showError("Network error. Please try again.");
          }
        });

      // Register form handler
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          clearMessages();

          const formData = new FormData(e.target);
          const data = Object.fromEntries(formData.entries());

          try {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(data),
            });

            const result = await response.json();

            if (response.ok) {
              showSuccess("Account created successfully! You can now sign in.");

              // Switch to login tab after successful registration
              setTimeout(() => {
                document.querySelector('[data-tab="login"]').click();
                // Pre-fill email in login form
                document.getElementById("loginEmail").value = data.email;
              }, 2000);
            } else {
              showError(
                result.message || "Registration failed. Please try again.",
              );
            }
          } catch (error) {
            console.error("Registration error:", error);
            showError("Network error. Please try again.");
          }
        });

      // Initialize Lucide icons if available
      if (typeof lucide !== "undefined") {
        lucide.createIcons();
      }
    </script>
  </body>
</html>
