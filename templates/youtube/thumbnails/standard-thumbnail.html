<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APGI YouTube Thumbnail Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --secondary: #0d9488;
            --accent: #7c3aed;
            --warning: #f59e0b;
            --text: #0f172a;
            --text-light: #ffffff;
            --bg: #ffffff;
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            --gradient-2: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .thumbnail-container {
            width: 1280px;
            height: 720px;
            background: var(--gradient);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .background-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
            opacity: 0.6;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 48px;
        }
        
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .logo-badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 12px 20px;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
        }
        
        .episode-badge {
            background: var(--warning);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            transform: rotate(5deg);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 0;
        }
        
        .headline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 72px;
            font-weight: 900;
            color: white;
            line-height: 1.1;
            margin-bottom: 24px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        
        .subheadline {
            font-size: 28px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            max-width: 800px;
            line-height: 1.3;
        }
        
        .key-point {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 24px 32px;
            max-width: 600px;
            margin-bottom: 40px;
        }
        
        .key-point-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-align: center;
        }
        
        .bottom-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        
        .expert-tag {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 8px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }
        
        .play-button {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }
        
        .play-icon {
            width: 0;
            height: 0;
            border-left: 24px solid var(--primary);
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            margin-left: 4px;
        }
        
        .duration-badge {
            background: rgba(0,0,0,0.7);
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 6px;
        }
        
        .accent-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.1;
            top: -200px;
            right: -200px;
        }
        
        .accent-circle-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            border-radius: 50%;
            opacity: 0.1;
            bottom: -150px;
            left: -150px;
        }
        
        .brain-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            opacity: 0.05;
            color: white;
        }
        
        @media (max-width: 768px) {
            .thumbnail-container {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
            
            .headline {
                font-size: 48px;
            }
            
            .subheadline {
                font-size: 20px;
            }
            
            .content-wrapper {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="thumbnail-container">
        <div class="background-pattern"></div>
        
        <div class="accent-circle"></div>
        <div class="accent-circle-2"></div>
        
        <div class="content-wrapper">
            <div class="top-section">
                <div class="logo-badge">APGI FRAMEWORK</div>
                <div class="episode-badge">EPISODE 12</div>
            </div>
            
            <div class="main-content">
                <h1 class="headline">CONSCIOUSNESS HACKED</h1>
                <p class="subheadline">Unlock Your Brain's Hidden Potential with Predictive Coding</p>
                
                <div class="key-point">
                    <p class="key-point-text">🧠 94% Success Rate • ⚡ Instant Results • 🎯 Science-Backed</p>
                </div>
            </div>
            
            <div class="bottom-section">
                <div class="expert-tag">Dr. Sarah Chen • Neuroscientist</div>
                <div class="play-button">
                    <div class="play-icon"></div>
                </div>
                <div class="duration-badge">18:42</div>
            </div>
        </div>
        
        <div class="brain-icon">🧠</div>
    </div>
</body>
</html>
